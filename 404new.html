<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Dulran.com</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono:wght@400;700&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg: #06070d;
  --accent: #7c6cff;
  --accent-2: #4de1c1;
  --text: #e8eaf2;
  --muted: #8a90a6;
}

html, body {
  height: 100%;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Grotesk', Helvetica, sans-serif;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ---- ambient background ---- */
.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(110px);
  opacity: 0.45;
  pointer-events: none;
  animation: drift 18s ease-in-out infinite alternate;
}

.orb-1 {
  width: 55vmax;
  height: 55vmax;
  background: radial-gradient(circle, #5b3df5, transparent 70%);
  top: -25vmax;
  left: -15vmax;
}

.orb-2 {
  width: 45vmax;
  height: 45vmax;
  background: radial-gradient(circle, #0e7a6c, transparent 70%);
  bottom: -20vmax;
  right: -10vmax;
  animation-delay: -9s;
}

@keyframes drift {
  from { transform: translate(0, 0) scale(1); }
  to   { transform: translate(6vmax, 4vmax) scale(1.15); }
}

.grid {
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
  background-size: 56px 56px;
  mask-image: radial-gradient(ellipse 70% 60% at 50% 45%, black 30%, transparent 100%);
  -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 45%, black 30%, transparent 100%);
  pointer-events: none;
}

/* ---- content card ---- */
.card {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 4rem 3rem;
  max-width: 640px;
  width: calc(100% - 2.5rem);
  border-radius: 24px;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.09);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  box-shadow: 0 30px 80px rgba(0, 0, 0, 0.55);
  animation: rise 0.9s cubic-bezier(0.2, 0.8, 0.2, 1) both;
}

@keyframes rise {
  from { opacity: 0; transform: translateY(28px); }
  to   { opacity: 1; transform: translateY(0); }
}

.badge {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--accent-2);
  border: 1px solid rgba(77, 225, 193, 0.35);
  border-radius: 999px;
  padding: 0.45em 1.2em;
  margin-bottom: 1.6rem;
}

.code {
  font-size: clamp(6rem, 22vw, 11rem);
  font-weight: 700;
  line-height: 1;
  letter-spacing: -0.04em;
  background: linear-gradient(120deg, var(--accent), var(--accent-2), var(--accent));
  background-size: 200% 100%;
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  animation: shimmer 6s linear infinite;
}

@keyframes shimmer {
  to { background-position: 200% 0; }
}

h1 {
  font-size: clamp(1.3rem, 4vw, 1.8rem);
  font-weight: 500;
  margin: 1rem 0 0.75rem;
}

p {
  color: var(--muted);
  font-size: 1rem;
  line-height: 1.7;
  max-width: 44ch;
  margin: 0 auto;
}

.actions {
  display: flex;
  flex-wrap: wrap;
  gap: 0.9rem;
  justify-content: center;
  margin-top: 2.2rem;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 0.5em;
  font-family: inherit;
  font-size: 0.95rem;
  font-weight: 500;
  text-decoration: none;
  padding: 0.85em 1.8em;
  border-radius: 12px;
  transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
}

.btn-primary {
  color: #fff;
  background: linear-gradient(120deg, var(--accent), #5b3df5);
  box-shadow: 0 8px 28px rgba(124, 108, 255, 0.35);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 36px rgba(124, 108, 255, 0.5);
}

.btn-ghost {
  color: var(--text);
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.14);
}

.btn-ghost:hover {
  transform: translateY(-2px);
  background: rgba(255, 255, 255, 0.1);
}

.note {
  margin-top: 2rem;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  color: var(--muted);
  letter-spacing: 0.04em;
}

.note .path {
  color: var(--accent-2);
}

@media (max-width: 480px) {
  .card { padding: 3rem 1.5rem; }
}

@media (prefers-reduced-motion: reduce) {
  .orb, .code { animation: none; }
}
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="grid"></div>

<div class="card">
  <span class="badge">Page not found</span>
  <div class="code">404</div>
  <h1>You've wandered off the map.</h1>
  <p>This page doesn't exist — my projects, about me, and gallery pages are still under construction. Follow me on LinkedIn to know when they go live.</p>
  <div class="actions">
    <a class="btn btn-primary" href="https://www.dulran.com/home67.html">&larr; Back to homepage</a>
    <a class="btn btn-ghost" href="https://www.linkedin.com/in/dulran/">Connect on LinkedIn</a>
  </div>
  <p class="note">lost at <span class="path" id="lost-path">/unknown</span></p>
</div>

<script>
  document.getElementById('lost-path').textContent = window.location.pathname || '/unknown';
</script>

</html>
