<!DOCTYPE html>
<html>
<head>
    <title>Mock UT Registration</title>
    <style>
        body {
            font-family: Arial;
            padding: 40px;
        }
        table {
            border-collapse: collapse;
            margin-top: 20px;
        }
        td, th {
            padding: 8px 12px;
            border: 1px solid #ccc;
        }
        input, select, button {
            padding: 5px;
        }
    </style>
</head>
<body>

<h2>Registration for Spring 2026</h2>
<p style="color: green;">Please select a registration action.</p>

<table>
    <tr>
        <th>SELECT</th>
        <th>UNIQUE NUMBER</th>
        <th>TRANSACTION</th>
    </tr>

    <!-- REGISTER ROW -->
    <tr>
        <td><input type="radio" name="action" checked></td>
        <td><input type="text" id="register_input"></td>
        <td>REGISTER for or ADD</td>
    </tr>

    <!-- DROP -->
    <tr>
        <td><input type="radio" name="action"></td>
        <td>
            <select>
                <option>Select unique to:</option>
            </select>
        </td>
        <td>DROP</td>
    </tr>

    <!-- DROP DEPENDENT (HAS SECOND INPUT) -->
    <tr>
        <td><input type="radio" name="action"></td>
        <td>
            <select>
                <option>Select unique to:</option>
            </select>
        </td>
        <td>
            DROP DEPENDENT UPON successfully ADDING
            <input type="text" id="dependent_input">
        </td>
    </tr>

    <!-- PASS/FAIL -->
    <tr>
        <td><input type="radio" name="action"></td>
        <td>
            <select>
                <option>Select unique to:</option>
            </select>
        </td>
        <td>CHANGE to or from PASS/FAIL or CREDIT/NO CREDIT basis</td>
    </tr>
</table>

<br>

<button onclick="submitForm()">Submit</button>
<button>Estimate Tuition Bill</button>

<h3 id="summary">You are scheduled for 0 classes</h3>

<table id="schedule">
    <tr>
        <th>Unique</th>
        <th>Course</th>
        <th>Status</th>
        <th>Meeting</th>
        <th>Title</th>
    </tr>
</table>

<script>
let courseCount = 0;

function submitForm() {
    const code = document.getElementById("register_input").value.trim();

    if (!code) {
        alert("Enter a course unique number");
        return;
    }

    // Fake course data (just to simulate)
    const courseName = "COURSE " + code;
    const status = "MW 2:00-3:00P";
    const meeting = "ROOM 1.101";
    const title = "AUTO-REGISTERED";

    const table = document.getElementById("schedule");

    const row = table.insertRow(-1);

    row.insertCell(0).innerText = code;
    row.insertCell(1).innerText = courseName;
    row.insertCell(2).innerText = status;
    row.insertCell(3).innerText = meeting;
    row.insertCell(4).innerText = title;

    courseCount++;
    document.getElementById("summary").innerText =
        "You are scheduled for " + courseCount + " class(es)";

    // Clear input after submit (matches real UX better)
    document.getElementById("register_input").value = "";
}
</script>

</body>
</html>
