<!DOCTYPE html>
<html>
<head>
    <title>Mock UT Registration</title>
    <style>
        body {
            font-family: Arial;
            padding: 40px;
        }
        table {
            border-collapse: collapse;
        }
        td {
            padding: 8px 12px;
            vertical-align: middle;
        }
        input, select, button {
            padding: 5px;
        }
    </style>
</head>
<body>

<h2>Registration for Spring 2026</h2>
<p style="color: green;">Please select a registration action.</p>

<table border="0">
    <tr>
        <th>SELECT</th>
        <th>UNIQUE NUMBER</th>
        <th>TRANSACTION</th>
    </tr>

    <!-- REGISTER ROW -->
    <tr>
        <td><input type="radio" name="action" checked></td>
        <td><input type="text" id="register_input"></td>
        <td>REGISTER for or ADD</td>
    </tr>

    <!-- DROP ROW -->
    <tr>
        <td><input type="radio" name="action"></td>
        <td>
            <select>
                <option>Select unique to:</option>
            </select>
        </td>
        <td>DROP</td>
    </tr>

    <!-- DROP DEPENDENT ROW (HAS SECOND INPUT) -->
    <tr>
        <td><input type="radio" name="action"></td>
        <td>
            <select>
                <option>Select unique to:</option>
            </select>
        </td>
        <td>
            DROP DEPENDENT UPON successfully ADDING
            <input type="text" id="dependent_input">
        </td>
    </tr>

    <!-- PASS/FAIL ROW -->
    <tr>
        <td><input type="radio" name="action"></td>
        <td>
            <select>
                <option>Select unique to:</option>
            </select>
        </td>
        <td>CHANGE to or from PASS/FAIL or CREDIT/NO CREDIT basis</td>
    </tr>
</table>

<br>

<button onclick="submitForm()">Submit</button>
<button>Estimate Tuition Bill</button>

<script>
function submitForm() {
    const reg = document.getElementById("register_input").value;
    const dep = document.getElementById("dependent_input").value;
    alert("Register input: " + reg + "\nDependent input: " + dep);
}
</script>

</body>
</html>
