<!DOCTYPE html>
<html>
<head>
    <title>Test Course Registration</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }
        input {
            padding: 10px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            margin-left: 10px;
        }
        #log {
            margin-top: 30px;
            width: 60%;
            margin-left: auto;
            margin-right: auto;
            text-align: left;
            border: 1px solid #ccc;
            padding: 10px;
            height: 200px;
            overflow-y: scroll;
        }
    </style>
</head>
<body>

    <h2>Course Registration Test</h2>

    <input id="courseInput" placeholder="Enter course code" />
    <button id="registerButton">Submit</button>

    <div id="log"></div>

    <script>
        const logDiv = document.getElementById("log");

        document.getElementById("registerButton").addEventListener("click", () => {
            const course = document.getElementById("courseInput").value;
            if (course.trim() === "") return;

            const entry = document.createElement("div");
            entry.textContent = "Registered for: " + course + " at " + new Date().toLocaleTimeString();
            logDiv.appendChild(entry);

            document.getElementById("courseInput").value = "";
        });

        // Allow Enter key
        document.getElementById("courseInput").addEventListener("keypress", function(e) {
            if (e.key === "Enter") {
                document.getElementById("registerButton").click();
            }
        });
    </script>

</body>
</html>
