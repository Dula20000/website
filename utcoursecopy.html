<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course ID Copy Tool</title>
  <style>
    :root {
      --bg: #f5f1e8;
      --card: #fffdf8;
      --text: #2f241d;
      --muted: #7a6a5f;
      --accent: #bf5700;
      --accent-dark: #8a3f00;
      --border: #dfd2c4;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top, #fff7ec 0%, #f5f1e8 45%, #efe7da 100%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .panel {
      width: min(700px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 18px 45px rgba(47, 36, 29, 0.1);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.9rem, 4vw, 2.6rem);
    }

    p {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.5;
    }

    .course-list {
      display: grid;
      gap: 12px;
    }

    .course-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      background: #fffaf2;
    }

    .course-id {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .placeholder {
      color: var(--muted);
      font-style: italic;
      font-weight: 600;
    }

    .copy-btn {
      border: none;
      border-radius: 12px;
      background: var(--accent);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      padding: 10px 14px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .copy-btn:hover {
      background: var(--accent-dark);
      transform: translateY(-1px);
    }

    .copy-btn:disabled {
      background: #ccb5a3;
      cursor: not-allowed;
      transform: none;
    }

    .status {
      margin-top: 18px;
      min-height: 24px;
      font-size: 0.98rem;
      color: var(--accent-dark);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>Unique Course IDs</h1>
    <p>Click the copy button next to any course ID to copy it to your clipboard.</p>

    <section class="course-list" id="courseList"></section>
    <div class="status" id="statusMessage" aria-live="polite"></div>
  </main>

  <script>
    const courseIds = [
      "15790",
      "16055",
      "15715",
      "15720",
      "15750",
      "",
      "",
      "",
      "",
      ""
    ];

    const courseList = document.getElementById("courseList");
    const statusMessage = document.getElementById("statusMessage");

    function showStatus(message) {
      statusMessage.textContent = message;
    }

    async function copyCourseId(courseId) {
      try {
        await navigator.clipboard.writeText(courseId);
        showStatus(`Copied ${courseId} to clipboard.`);
      } catch (error) {
        showStatus("Clipboard copy failed.");
      }
    }

    courseIds.forEach((courseId, index) => {
      const item = document.createElement("div");
      item.className = "course-item";

      const label = document.createElement("span");
      label.className = courseId ? "course-id" : "course-id placeholder";
      label.textContent = courseId || `Course ID ${index + 1} - add later`;

      const button = document.createElement("button");
      button.className = "copy-btn";
      button.type = "button";
      button.innerHTML = courseId ? "Copy" : "Pending";
      button.disabled = !courseId;

      if (courseId) {
        button.setAttribute("aria-label", `Copy course ID ${courseId}`);
        button.addEventListener("click", () => copyCourseId(courseId));
      }

      item.append(label, button);
      courseList.appendChild(item);
    });
  </script>
</body>
</html>
