<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Au Revoir, Les Bleus — 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0c2752;
      --bg-deep: #061029;
      --gold: #f0e0a0;
      --gold-bright: #fff6d8;
      --gold-deep: #a98e4d;
      --gold-soft: rgba(240, 224, 160, 0.75);
      --gold-dim: rgba(240, 224, 160, 0.18);
    }

    html, body { width: 100%; height: 100%; overflow: hidden; }

    body {
      background: radial-gradient(ellipse at 50% 40%, #12315f 0%, var(--bg) 45%, var(--bg-deep) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      font-family: 'Cormorant Garamond', 'Palatino Linotype', 'Book Antiqua', Georgia, serif;
      position: relative;
    }

    /* ===================================================================
       LAYER 1  ·  The moving player reel (behind everything)
       Columns of player "kit" tiles scrolling continuously, some up,
       some down — the montage the text sits over.
       =================================================================== */
    .reel {
      position: fixed;
      inset: -6% 0;
      z-index: 1;
      display: flex;
      justify-content: center;
      gap: clamp(14px, 4vw, 46px);
      pointer-events: none;
      overflow: hidden;
      -webkit-mask-image: linear-gradient(to bottom, transparent, #000 12%, #000 88%, transparent);
              mask-image: linear-gradient(to bottom, transparent, #000 12%, #000 88%, transparent);
    }

    .reel-col { width: clamp(120px, 30vw, 168px); flex: 0 0 auto; }
    .reel-inner {
      display: flex;
      flex-direction: column;
      gap: clamp(16px, 3vw, 26px);
      will-change: transform;
    }
    .reel-col.up   .reel-inner { animation: scrollUp   var(--dur, 32s) linear infinite; }
    .reel-col.down .reel-inner { animation: scrollDown var(--dur, 32s) linear infinite; }

    @keyframes scrollUp   { from { transform: translateY(0); }      to { transform: translateY(-50%); } }
    @keyframes scrollDown { from { transform: translateY(-50%); }   to { transform: translateY(0); } }

    /* Individual player tile */
    .tile {
      position: relative;
      padding: 20px 12px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      text-align: center;
      border: 1px solid rgba(240, 224, 160, 0.22);
      border-radius: 4px;
      background:
        linear-gradient(160deg, rgba(240,224,160,0.12) 0%, rgba(240,224,160,0.02) 50%, rgba(240,224,160,0.08) 100%);
      box-shadow: inset 0 0 24px rgba(240,224,160,0.05), 0 8px 30px rgba(0,0,0,0.25);
    }
    .tile::before {
      content: '';
      position: absolute;
      inset: 5px;
      border: 1px solid rgba(240, 224, 160, 0.12);
      border-radius: 2px;
      pointer-events: none;
    }

    /* The player image frame: photo when it loads, gold kit as fallback */
    .kit {
      position: relative;
      width: 84%;
      max-width: 132px;
      margin: 2px auto 4px;
      aspect-ratio: 4 / 5;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-radius: 3px;
    }
    .kit-svg { display: block; width: 92%; height: auto; filter: drop-shadow(0 3px 8px rgba(0,0,0,0.3)); }
    .player-photo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      /* warm the photo so it sits behind the gold film naturally */
      filter: sepia(0.3) saturate(0.85) contrast(1.03) brightness(0.92);
    }
    .kit-num {
      position: absolute;
      top: 52%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(26px, 7vw, 40px);
      font-weight: 500;
      font-style: italic;
      line-height: 1;
      color: var(--bg-deep);
      text-shadow: 0 1px 0 rgba(255,246,216,0.35);
    }

    .tile-name {
      font-size: clamp(17px, 4.4vw, 23px);
      font-style: italic;
      font-weight: 500;
      line-height: 1.05;
      background: linear-gradient(100deg, var(--gold-deep) 0%, var(--gold) 30%, var(--gold-bright) 50%, var(--gold) 70%, var(--gold-deep) 100%);
      background-size: 220% auto;
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent; color: transparent;
      animation: goldShift 6s linear infinite;
    }
    .tile-first {
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold-soft);
      font-weight: 400;
    }
    .tile-pos {
      font-size: 8px;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: rgba(240,224,160,0.55);
      margin-top: 3px;
    }

    @keyframes goldShift { to { background-position: 220% center; } }

    /* ===================================================================
       LAYER 2  ·  The gold reflection sheet.
       Semi-transparent brushed-gold film with a slow travelling
       highlight, so the moving reel reads as if seen THROUGH gold.
       =================================================================== */
    .gold-sheet {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      mix-blend-mode: screen;
      background:
        repeating-linear-gradient(118deg,
          rgba(255,246,216,0.00) 0px,
          rgba(255,246,216,0.05) 1px,
          rgba(160,140,80,0.00) 4px,
          rgba(255,246,216,0.00) 7px),
        linear-gradient(125deg,
          rgba(120,96,40,0.05) 0%,
          rgba(240,224,160,0.14) 32%,
          rgba(255,246,216,0.18) 50%,
          rgba(240,224,160,0.12) 68%,
          rgba(120,96,40,0.05) 100%);
    }
    .gold-sheet::after {
      content: '';
      position: absolute;
      inset: -40%;
      background: linear-gradient(118deg,
        transparent 42%,
        rgba(255,248,224,0.16) 49%,
        rgba(255,248,224,0.28) 50%,
        rgba(255,248,224,0.16) 51%,
        transparent 58%);
      background-size: 260% 260%;
      mix-blend-mode: screen;
      animation: sweep 8.5s ease-in-out infinite;
    }
    @keyframes sweep {
      0%        { background-position: 130% -30%; }
      50%, 100% { background-position: -30% 130%; }
    }
<!--
    /* ===================================================================
       LAYER 3  ·  Le Coq — the rooster watermark.
       =================================================================== */
    .coq {
      position: fixed;
      z-index: 3;
      left: 50%; bottom: 3%;
      width: clamp(150px, 34vw, 230px);
      transform: translateX(-50%);
      opacity: 0;
      pointer-events: none;
      animation: coqIn 2.4s ease 0.6s forwards;
    }
    .coq svg { width: 100%; height: auto; display: block; }
    .coq-stroke { fill: none; stroke: rgba(240,224,160,0.30); stroke-width: 2.4; stroke-linejoin: round; stroke-linecap: round; }
    .coq-fill   { fill: rgba(240,224,160,0.07); }
    @keyframes coqIn { to { opacity: 1; } }

    /* Framing rules + corners (kept from original) */
    .rule-h-top, .rule-h-bottom {
      position: fixed; left: 0; right: 0; height: 1px; z-index: 4;
      background: linear-gradient(to right, transparent, var(--gold-dim) 30%, var(--gold-dim) 70%, transparent);
      opacity: 0; animation: fadeIn 1.5s ease forwards;
    }
    .rule-h-top { top: 0; }
    .rule-h-bottom { bottom: 0; animation-delay: 0.2s; }

    .corner { position: fixed; width: 36px; height: 36px; z-index: 4; opacity: 0; animation: fadeIn 2s ease 1s forwards; }
    .corner svg { width: 100%; height: 100%; }
    .corner.tl { top: 24px; left: 24px; }
    .corner.tr { top: 24px; right: 24px; transform: scaleX(-1); }
    .corner.bl { bottom: 24px; left: 24px; transform: scaleY(-1); }
    .corner.br { bottom: 24px; right: 24px; transform: scale(-1); }

    @keyframes fadeIn { to { opacity: 1; } }
-->
    /* ===================================================================
       LAYER 4  ·  The text (top). Full-screen darkened scrim keeps it
       legible while the reel shows through around it.
       =================================================================== */
    .stage {
      position: relative;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(28px, 5vh, 46px);
      padding: 40px 32px;
      max-width: 760px;
      width: 100%;
      text-align: center;
    }
    .stage::before {
      content: '';
      position: absolute;
      inset: -14% -8%;
      z-index: -1;
      background: radial-gradient(ellipse at center, rgba(6,16,38,0.86) 0%, rgba(6,16,38,0.7) 42%, rgba(6,16,38,0.0) 78%);
    }

    .logo-slot {
      width: 108px; height: 108px;
      opacity: 0; transform: scale(0.85);
      animation: logoReveal 1.2s cubic-bezier(0.22,1,0.36,1) 0.3s forwards;
    }
    .logo-slot img { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 4px 14px rgba(0,0,0,0.4)); }
    @keyframes logoReveal { to { opacity: 1; transform: scale(1); } }

    .eyebrow {
      font-size: 10px; letter-spacing: 0.32em; text-transform: uppercase;
      color: var(--gold-soft); font-weight: 300;
      opacity: 0; animation: fadeUp 1s ease 0.9s forwards;
    }

    .declaration {
      font-size: clamp(21px, 3vw, 34px);
      font-weight: 300; font-style: italic;
      line-height: 1.7; letter-spacing: 0.01em;
      min-height: 3.2em; position: relative;
    }
    .declaration .typed-text {
      background: linear-gradient(100deg, var(--gold-deep) 0%, var(--gold) 28%, var(--gold-bright) 50%, var(--gold) 72%, var(--gold-deep) 100%);
      background-size: 200% auto;
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent; color: transparent;
      animation: goldShift 7s linear infinite;
    }
    .cursor {
      display: inline-block; width: 1.5px; height: 1em;
      background: var(--gold); margin-left: 3px; vertical-align: middle;
      animation: blink 1.1s step-end infinite; transform: translateY(-0.06em);
    }
    .cursor.done { animation: cursorFade 0.8s ease 1.6s forwards; }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
    @keyframes cursorFade { to { opacity: 0; } }

    .signature {
      font-size: 13px; letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--gold-soft); font-weight: 300;
      opacity: 0; animation: fadeUp 1s ease forwards; animation-play-state: paused;
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 720px) {
      .reel-col.hide-sm { display: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      .reel-col .reel-inner,
      .gold-sheet::after,
      .tile-name, .declaration .typed-text { animation: none !important; }
    }
  </style>
</head>
<body>

  <!-- Shared SVG defs: gold gradient + the reusable jersey shape -->
  <svg width="0" height="0" aria-hidden="true" style="position:absolute">
    <defs>
      <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0"   stop-color="#a98e4d"/>
        <stop offset="0.35" stop-color="#f0e0a0"/>
        <stop offset="0.5" stop-color="#fff6d8"/>
        <stop offset="0.65" stop-color="#f0e0a0"/>
        <stop offset="1"   stop-color="#8f7538"/>
      </linearGradient>
      <symbol id="jersey" viewBox="0 0 100 112">
        <path d="M50 6 C46 12 40 13 34 10 L20 17 C15 20 11 26 9 33 L7 41
                 C6 45 9 48 13 47 L24 43 L24 101 C24 105 27 107 31 107
                 L69 107 C73 107 76 105 76 101 L76 43 L87 47 C91 48 94 45 93 41
                 L91 33 C89 26 85 20 80 17 L66 10 C60 13 54 12 50 6 Z"
              fill="url(#goldGrad)" stroke="rgba(255,246,216,0.5)" stroke-width="1"/>
      </symbol>
    </defs>
  </svg>

  <!-- LAYER 1 : moving player reel -->
  <div class="reel" aria-hidden="true">
    <div class="reel-col up"   style="--dur:30s"><div class="reel-inner" data-col="0"></div></div>
    <div class="reel-col down" style="--dur:38s"><div class="reel-inner" data-col="1"></div></div>
    <div class="reel-col up hide-sm" style="--dur:34s"><div class="reel-inner" data-col="2"></div></div>
  </div>

  <!-- LAYER 2 : gold reflection film -->
  <div class="gold-sheet" aria-hidden="true"></div>

  <!-- LAYER 3 : le coq -->
  <div class="coq" aria-hidden="true">
    <img viewBox="0 0 260 240" src="https://www.cleanpng.com/free/fff-logo.html">
  </div>

  <!-- Framing -->
  <div class="rule-h-top"></div>
  <div class="rule-h-bottom"></div>
  <div class="corner tl"><svg viewBox="0 0 36 36" fill="none"><path d="M2 34 L2 2 L34 2" stroke="rgba(240,224,160,0.3)" stroke-width="1"/><path d="M2 18 L2 2 L18 2" stroke="rgba(240,224,160,0.15)" stroke-width="0.5"/></svg></div>
  <div class="corner tr"><svg viewBox="0 0 36 36" fill="none"><path d="M2 34 L2 2 L34 2" stroke="rgba(240,224,160,0.3)" stroke-width="1"/><path d="M2 18 L2 2 L18 2" stroke="rgba(240,224,160,0.15)" stroke-width="0.5"/></svg></div>
  <div class="corner bl"><svg viewBox="0 0 36 36" fill="none"><path d="M2 34 L2 2 L34 2" stroke="rgba(240,224,160,0.3)" stroke-width="1"/><path d="M2 18 L2 2 L18 2" stroke="rgba(240,224,160,0.15)" stroke-width="0.5"/></svg></div>
  <div class="corner br"><svg viewBox="0 0 36 36" fill="none"><path d="M2 34 L2 2 L34 2" stroke="rgba(240,224,160,0.3)" stroke-width="1"/><path d="M2 18 L2 2 L18 2" stroke="rgba(240,224,160,0.15)" stroke-width="0.5"/></svg></div>

  <!-- LAYER 4 : text -->
  <div class="stage">
    <div class="logo-slot"><img src="logofiles/crestlogomedium.png" alt="Les Bleus" /></div>
    <span class="eyebrow">FIFA World Cup 2026 &nbsp;·&nbsp; Au Revoir</span>
    <p class="declaration">
      <span class="typed-text" id="typedText"></span><span class="cursor" id="cursor"></span>
    </p>
    <span class="signature" id="signature">Merci, Les Bleus &nbsp;·&nbsp;2026</span>
  </div>

  <script>
    /* ---- Build the moving reel ---- */
    // Photo URLs are placeholders — upload the real files to
    // dulran.com/assets/players/ with these names and they appear
    // automatically; until then the tile falls back to the gold kit.
    const PHOTO_BASE = 'https://www.dulran.com/assets/players/';
    const players = [
      { name: 'Mbappé',  first: 'Kylian',  pos: 'Attaquant · Capitaine', num: 10, photo: 'mbappe.png'  },
      { name: 'Dembélé', first: 'Ousmane', pos: 'Attaquant',             num: 11, photo: 'dembele.png' },
      { name: 'Olise',   first: 'Michael', pos: 'Ailier',                num: 17, photo: 'olise.png'   },
      { name: 'Doué',    first: 'Désiré',  pos: 'Ailier',                num: 20, photo: 'doue.png'    },
      { name: 'Barcola', first: 'Bradley', pos: 'Ailier',                num: 24, photo: 'barcola.png' },
    ];

    function tileHTML(p) {
      return (
        '<div class="tile">' +
          '<div class="kit">' +
            '<svg class="kit-svg" viewBox="0 0 100 112"><use href="#jersey" xlink:href="#jersey"/></svg>' +
            '<span class="kit-num">' + p.num + '</span>' +
            '<img class="player-photo" src="' + PHOTO_BASE + p.photo + '" alt="" loading="lazy" onerror="this.remove()">' +
          '</div>' +
          '<span class="tile-first">' + p.first + '</span>' +
          '<span class="tile-name">' + p.name + '</span>' +
          '<span class="tile-pos">' + p.pos + '</span>' +
        '</div>'
      );
    }

    // Three columns, each a different rotation so they never line up.
    const orders = [ [0,1,2,3,4], [2,3,4,0,1], [4,0,1,2,3] ];
    document.querySelectorAll('.reel-inner').forEach(function (col) {
      const order = orders[+col.dataset.col];
      const set = order.map(function (i) { return tileHTML(players[i]); }).join('');
      col.innerHTML = set + set; // duplicated for a seamless loop
    });

    /* ---- Typewriter farewell ---- */
    const message = "Sorry to see you go, Les Bleus. Merci for the memories. With you again in 2030.";
    const typedEl = document.getElementById('typedText');
    const cursor  = document.getElementById('cursor');
    const sigEl   = document.getElementById('signature');

    const START_DELAY = 1400, CHAR_SPEED = 46, VARIANCE = 18;
    let i = 0;
    function typeNext() {
      if (i < message.length) {
        typedEl.textContent += message[i];
        i++;
        const ch = message[i - 1];
        const extra = (ch === ',' || ch === '.') ? 180 : 0;
        setTimeout(typeNext, CHAR_SPEED + (Math.random() * VARIANCE * 2 - VARIANCE) + extra);
      } else {
        cursor.classList.add('done');
        sigEl.style.animationPlayState = 'running';
      }
    }
    setTimeout(typeNext, START_DELAY);
  </script>

  <script>
    // Return home; index.html decides where that is.
    setTimeout(function () { window.location.href = "index.html"; }, 40000);
  </script>
</body>
</html>
