<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Au Revoir, Les Bleus — 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0c2752;
      --gold: #f0e0a0;
      --gold-bright: #fff6d8;
      --gold-deep: #a98e4d;
      --gold-soft: rgba(240, 224, 160, 0.75);
      --gold-dim: rgba(240, 224, 160, 0.18);
      --gold-glow: rgba(240, 224, 160, 0.06);
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background-color: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      font-family: 'Cormorant Garamond', 'Palatino Linotype', 'Book Antiqua', Georgia, serif;
      position: relative;
    }

    /* Subtle noise overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }

    /* Radial vignette */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(4, 12, 30, 0.7) 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* Decorative top rule */
    .rule-top, .rule-bottom {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      width: 1px;
      background: linear-gradient(to bottom, transparent, var(--gold-dim), transparent);
      z-index: 1;
      opacity: 0;
      animation: fadeRule 1.5s ease forwards;
    }
    .rule-top {
      top: 0;
      height: 120px;
      animation-delay: 0.3s;
    }
    .rule-bottom {
      bottom: 0;
      height: 120px;
      animation-delay: 0.4s;
    }

    .rule-h-top, .rule-h-bottom {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold-dim) 30%, var(--gold-dim) 70%, transparent);
      z-index: 1;
      opacity: 0;
      animation: fadeRule 1.5s ease forwards;
    }
    .rule-h-bottom {
      top: auto;
      bottom: 0;
      animation-delay: 0.2s;
    }

    @keyframes fadeRule {
      to { opacity: 1; }
    }

    /* ============================================================
       Floating player tiles — behind the text, ~50% opacity,
       drifting slowly with a periodic gold light-sweep across
       each one (20th Century Fox molten-gold reflection feel).
       ============================================================ */
    .tile-field {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .player-tile {
      position: absolute;
      width: var(--w, 190px);
      padding: 26px 18px 22px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-align: center;
      border: 1px solid rgba(240, 224, 160, 0.24);
      background: linear-gradient(165deg,
        rgba(240, 224, 160, 0.10) 0%,
        rgba(240, 224, 160, 0.03) 45%,
        rgba(240, 224, 160, 0.07) 100%);
      box-shadow: 0 0 42px rgba(240, 224, 160, 0.05),
                  inset 0 0 26px rgba(240, 224, 160, 0.04);
      overflow: hidden;
      opacity: 0;
      animation-name: tileIn, tileDrift;
      animation-duration: 2.2s, var(--driftDur, 16s);
      animation-timing-function: ease, ease-in-out;
      animation-delay: var(--inDelay, 1s), 0s;
      animation-iteration-count: 1, infinite;
      animation-direction: normal, alternate;
      animation-fill-mode: forwards, none;
    }

    /* Inner hairline frame */
    .player-tile::before {
      content: '';
      position: absolute;
      inset: 7px;
      border: 1px solid rgba(240, 224, 160, 0.14);
      pointer-events: none;
    }

    /* Gold light sweep across the tile */
    .player-tile::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(115deg,
        transparent 35%,
        rgba(255, 248, 222, 0.35) 47%,
        rgba(240, 224, 160, 0.14) 53%,
        transparent 65%);
      background-size: 300% 100%;
      background-position: 160% 0;
      mix-blend-mode: screen;
      animation: sheen var(--sheenDur, 6.5s) ease-in-out infinite;
      animation-delay: var(--sheenDelay, 0s);
    }

    @keyframes tileIn {
      from { opacity: 0; }
      to   { opacity: var(--tileOp, 0.5); }
    }

    @keyframes tileDrift {
      from { transform: translate3d(0, 0, 0) rotate(var(--r0, -1.1deg)); }
      to   { transform: translate3d(var(--dx, 16px), var(--dy, -22px), 0) rotate(var(--r1, 1.1deg)); }
    }

    @keyframes sheen {
      0%        { background-position: 160% 0; }
      45%, 100% { background-position: -160% 0; }
    }

    .tile-pos {
      font-size: 8px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold-soft);
      font-weight: 300;
    }

    .tile-first {
      font-size: 12px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--gold-soft);
      font-weight: 400;
      margin-top: 6px;
    }

    .tile-name {
      font-size: 29px;
      font-style: italic;
      font-weight: 500;
      line-height: 1.1;
      background: linear-gradient(100deg,
        var(--gold-deep) 0%,
        var(--gold) 28%,
        var(--gold-bright) 50%,
        var(--gold) 72%,
        var(--gold-deep) 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      animation: goldShift 6s linear infinite;
    }

    .tile-divider {
      width: 34px;
      height: 1px;
      margin-top: 8px;
      background: linear-gradient(to right, transparent, var(--gold-soft), transparent);
    }

    @keyframes goldShift {
      to { background-position: 200% center; }
    }

    /* Tile placement + per-tile drift character */
    .tile-mbappe {
      top: 13%; left: 5%;
      --w: 212px;
      --inDelay: 0.9s;  --driftDur: 17s;
      --dx: 18px; --dy: -24px; --r0: -1.4deg; --r1: 0.8deg;
      --sheenDur: 6.2s; --sheenDelay: 0.4s;
    }
    .tile-dembele {
      top: 10%; right: 6%;
      --w: 198px;
      --inDelay: 1.2s;  --driftDur: 19s;
      --dx: -16px; --dy: -18px; --r0: 1.2deg; --r1: -1deg;
      --sheenDur: 7.1s; --sheenDelay: 1.6s;
    }
    .tile-olise {
      bottom: 11%; right: 7%;
      --w: 186px;
      --inDelay: 1.5s;  --driftDur: 15s;
      --dx: -14px; --dy: 20px; --r0: -0.9deg; --r1: 1.3deg;
      --sheenDur: 6.8s; --sheenDelay: 2.8s;
    }
    .tile-doue {
      bottom: 10%; left: 6%;
      --w: 186px;
      --inDelay: 1.8s;  --driftDur: 18s;
      --dx: 15px; --dy: 22px; --r0: 1deg; --r1: -1.2deg;
      --sheenDur: 7.4s; --sheenDelay: 4s;
    }
    .tile-barcola {
      top: 4%; left: 50%; margin-left: -84px;
      --w: 168px;
      --inDelay: 2.1s;  --driftDur: 16s;
      --dx: 10px; --dy: 14px; --r0: -0.7deg; --r1: 0.9deg;
      --sheenDur: 6.6s; --sheenDelay: 5.2s;
    }

    @media (max-width: 760px) {
      .player-tile {
        --tileOp: 0.32;
        padding: 16px 10px 14px;
      }
      .tile-mbappe  { --w: 138px; top: 8%; left: 3%; }
      .tile-dembele { --w: 132px; top: 6%; right: 3%; }
      .tile-olise   { --w: 128px; bottom: 7%; right: 3%; }
      .tile-doue    { --w: 128px; bottom: 6%; left: 3%; }
      .tile-barcola { display: none; }
      .tile-name  { font-size: 20px; }
      .tile-first { font-size: 10px; }
      .tile-pos   { font-size: 7px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .player-tile {
        animation: tileIn 0.5s ease forwards;
      }
      .player-tile::after,
      .tile-name {
        animation: none;
      }
    }

    /* Main container */
    .stage {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 52px;
      padding: 40px 48px;
      max-width: 780px;
      text-align: center;
    }

    /* Logo placeholder */
    .logo-slot {
      width: 120px;
      height: 120px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      opacity: 0;
      transform: scale(0.85);
      animation: logoReveal 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
    }

    .logo-slot img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    @keyframes logoReveal {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* Eyebrow label */
    .eyebrow {
      font-size: 10px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--gold-soft);
      opacity: 0;
      animation: fadeUp 1s ease 0.8s forwards;
      font-weight: 300;
    }

    /* Main text */
    .declaration {
      font-size: clamp(22px, 3.2vw, 36px);
      font-weight: 300;
      font-style: italic;
      color: var(--gold);
      line-height: 1.72;
      letter-spacing: 0.01em;
      min-height: 3.2em;
      position: relative;
    }

    .declaration .typed-text {
      display: inline;
      background: linear-gradient(100deg,
        var(--gold-deep) 0%,
        var(--gold) 28%,
        var(--gold-bright) 50%,
        var(--gold) 72%,
        var(--gold-deep) 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: goldShift 7s linear infinite;
    }

    /* Cursor */
    .cursor {
      display: inline-block;
      width: 1.5px;
      height: 1em;
      background: var(--gold);
      margin-left: 3px;
      vertical-align: middle;
      animation: blink 1.1s step-end infinite;
      opacity: 1;
      transform: translateY(-0.06em);
    }

    .cursor.done {
      animation: cursorFade 0.8s ease 1.6s forwards;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    @keyframes cursorFade {
      to { opacity: 0; }
    }

    /* Signature / year */
    .signature {
      font-size: 13px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--gold-soft);
      opacity: 0;
      animation: fadeUp 1s ease forwards;
      animation-play-state: paused;
      font-weight: 300;
    }

    /* Corner ornaments */
    .corner {
      position: fixed;
      width: 36px;
      height: 36px;
      z-index: 2;
      opacity: 0;
      animation: fadeRule 2s ease 1s forwards;
    }
    .corner svg { width: 100%; height: 100%; }
    .corner.tl { top: 28px; left: 28px; }
    .corner.tr { top: 28px; right: 28px; transform: scaleX(-1); }
    .corner.bl { bottom: 28px; left: 28px; transform: scaleY(-1); }
    .corner.br { bottom: 28px; right: 28px; transform: scale(-1); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Glow pulse on text once done */
    @keyframes goldGlow {
      0%, 100% { text-shadow: 0 0 40px rgba(240, 224, 160, 0.0); }
      50% { text-shadow: 0 0 60px rgba(240, 224, 160, 0.12), 0 0 120px rgba(240, 224, 160, 0.05); }
    }

    .declaration.glow-active {
      animation: goldGlow 4s ease-in-out infinite;
    }
  </style>
</head>
<body>

  <!-- Structural rules -->
  <div class="rule-top"></div>
  <div class="rule-bottom"></div>
  <div class="rule-h-top"></div>
  <div class="rule-h-bottom"></div>

  <!-- Corner ornaments -->
  <div class="corner tl">
    <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 34 L2 2 L34 2" stroke="rgba(240,224,160,0.3)" stroke-width="1"/>
      <path d="M2 18 L2 2 L18 2" stroke="rgba(240,224,160,0.15)" stroke-width="0.5"/>
    </svg>
  </div>
  <div class="corner tr">
    <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 34 L2 2 L34 2" stroke="rgba(240,224,160,0.3)" stroke-width="1"/>
      <path d="M2 18 L2 2 L18 2" stroke="rgba(240,224,160,0.15)" stroke-width="0.5"/>
    </svg>
  </div>
  <div class="corner bl">
    <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 34 L2 2 L34 2" stroke="rgba(240,224,160,0.3)" stroke-width="1"/>
      <path d="M2 18 L2 2 L18 2" stroke="rgba(240,224,160,0.15)" stroke-width="0.5"/>
    </svg>
  </div>
  <div class="corner br">
    <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 34 L2 2 L34 2" stroke="rgba(240,224,160,0.3)" stroke-width="1"/>
      <path d="M2 18 L2 2 L18 2" stroke="rgba(240,224,160,0.15)" stroke-width="0.5"/>
    </svg>
  </div>

  <!-- Floating player tiles (behind the text) -->
  <div class="tile-field" aria-hidden="true">
    <div class="player-tile tile-mbappe">
      <span class="tile-pos">Forward · Captain</span>
      <span class="tile-first">Kylian</span>
      <span class="tile-name">Mbappé</span>
      <span class="tile-divider"></span>
    </div>
    <div class="player-tile tile-dembele">
      <span class="tile-pos">Forward</span>
      <span class="tile-first">Ousmane</span>
      <span class="tile-name">Dembélé</span>
      <span class="tile-divider"></span>
    </div>
    <div class="player-tile tile-olise">
      <span class="tile-pos">Winger</span>
      <span class="tile-first">Michael</span>
      <span class="tile-name">Olise</span>
      <span class="tile-divider"></span>
    </div>
    <div class="player-tile tile-doue">
      <span class="tile-pos">Winger</span>
      <span class="tile-first">Désiré</span>
      <span class="tile-name">Doué</span>
      <span class="tile-divider"></span>
    </div>
    <div class="player-tile tile-barcola">
      <span class="tile-pos">Winger</span>
      <span class="tile-first">Bradley</span>
      <span class="tile-name">Barcola</span>
      <span class="tile-divider"></span>
    </div>
  </div>

  <!-- Main content -->
  <div class="stage">

    <div class="logo-slot" id="logoSlot">
      <img src="https://www.dulran.com/logofiles/crestlogomedium.png" alt="Les Bleus" />
    </div>

    <span class="eyebrow">FIFA World Cup 2026 &nbsp;·&nbsp; Au Revoir</span>

    <p class="declaration" id="declaration">
      <span class="typed-text" id="typedText"></span><span class="cursor" id="cursor"></span>
    </p>

    <span class="signature" id="signature">Merci, Les Bleus &nbsp;·&nbsp; 2018 – 2026</span>

  </div>

  <script>
    const message = "Sorry to see you go, Les Bleus. Merci for the memories — with you since 2018, with you again in 2030.";
    const typedEl = document.getElementById('typedText');
    const cursor  = document.getElementById('cursor');
    const sigEl   = document.getElementById('signature');
    const declEl  = document.getElementById('declaration');

    const START_DELAY  = 1400;
    const CHAR_SPEED   = 46;
    const VARIANCE     = 18;

    let i = 0;

    function typeNext() {
      if (i < message.length) {
        typedEl.textContent += message[i];
        i++;
        const delay = CHAR_SPEED + (Math.random() * VARIANCE * 2 - VARIANCE);
        const ch = message[i - 1];
        const extra = (ch === ',' || ch === '.') ? 180 : 0;
        setTimeout(typeNext, delay + extra);
      } else {
        cursor.classList.add('done');
        declEl.classList.add('glow-active');
        sigEl.style.animationPlayState = 'running';
      }
    }

    setTimeout(typeNext, START_DELAY);
  </script>

<script>
    setTimeout(function() {
        window.location.href = "https://dulran.com/home70";
    }, 20000); // time in milliseconds — extended so the tiles get seen
</script>
</body>
</html>
