<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <!-- Ably Realtime SDK -->
  <script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
  <style>
    :root {
      --bg:      #0c0c0c;
      --surface: #141414;
      --border:  #242424;
      --text:    #ccc8be;
      --dim:     #484848;
      --accent:  #c8b560;
      --new:     #82c99a;
      --font:    "IBM Plex Mono", monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.65;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 28px;
      min-height: 100svh;
    }

    /* ── FEED ─────────────────────────── */
    #feed {
      width: 100%;
      max-width: 580px;
      padding: 28px 22px 0;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 1px;
      overflow: hidden;
    }

    .msg {
      display: flex;
      gap: 12px;
      align-items: baseline;
      animation: rise 0.2s ease forwards;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Age-based fading: oldest = most faded */
    .msg[data-age="0"] { color: var(--dim); }
    .msg[data-age="1"] { opacity: 0.38; }
    .msg[data-age="2"] { opacity: 0.5;  }
    .msg[data-age="3"] { opacity: 0.62; }
    .msg[data-age="4"] { opacity: 0.72; }
    .msg[data-age="5"] { opacity: 0.80; }
    .msg[data-age="6"] { opacity: 0.86; }
    .msg[data-age="7"] { opacity: 0.91; }
    .msg[data-age="8"] { opacity: 0.96; }
    .msg[data-age="9"] { opacity: 1; color: var(--new); }

    .msg-time {
      font-size: 10px;
      color: var(--dim);
      flex-shrink: 0;
      white-space: nowrap;
      padding-top: 2px;
      font-weight: 300;
    }

    .msg[data-age="9"] .msg-time {
      color: color-mix(in srgb, var(--new) 50%, var(--dim));
    }

    .msg-text {
      word-break: break-word;
    }

    /* ── DIVIDER ──────────────────────── */
    .divider {
      width: 100%;
      max-width: 580px;
      margin: 14px 0;
      height: 1px;
      background: var(--border);
    }

    /* ── INPUT ────────────────────────── */
    #input-wrap {
      width: 100%;
      max-width: 580px;
      padding: 0 22px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #prompt {
      color: var(--accent);
      user-select: none;
      flex-shrink: 0;
    }

    #msg-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: var(--font);
      font-size: 14px;
      color: var(--text);
      caret-color: var(--accent);
    }

    #msg-input::placeholder { color: var(--dim); }

    /* ── STATUS DOT ───────────────────── */
    #status {
      position: fixed;
      top: 14px;
      right: 16px;
      font-size: 10px;
      color: var(--dim);
      letter-spacing: 0.06em;
      transition: color 0.4s;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    #status::before {
      content: "";
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--dim);
      transition: background 0.4s;
    }

    #status.live::before  { background: var(--new); }
    #status.err::before   { background: #c87070; }

    /* ── EMPTY ────────────────────────── */
    #empty {
      color: var(--dim);
      font-size: 12px;
      font-style: italic;
      text-align: center;
      padding: 48px 0 24px;
    }
  </style>
</head>
<body>

  <div id="status">connecting</div>

  <div id="feed">
    <div id="empty">no messages yet</div>
  </div>

  <div class="divider"></div>

  <div id="input-wrap">
    <span id="prompt">&gt;</span>
    <input
      id="msg-input"
      type="text"
      placeholder="type something..."
      autocomplete="off"
      autocorrect="off"
      spellcheck="false"
      maxlength="500"
    />
  </div>

  <script>
    // ─────────────────────────────────────────────────────
    //  CONFIG — set your Worker URL here
    // ─────────────────────────────────────────────────────
    const WORKER_URL   = "https://broken-wildflower-57da.junkmails20d.workers.dev";
    const ABLY_CHANNEL = "silent-chat";   // must match worker.js
    const FALLBACK_MS  = 8000;            // poll interval if WS drops
    // ─────────────────────────────────────────────────────

    const feed   = document.getElementById("feed");
    const input  = document.getElementById("msg-input");
    const status = document.getElementById("status");
    const empty  = document.getElementById("empty");

    let fallbackTimer = null;
    let ably = null;

    // ── Helpers ──────────────────────────────────────────

    function fmtTime(ts) {
      return new Date(ts).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    }

    function setStatus(label, cls) {
      status.textContent = label;
      status.className = cls || "";
    }

    // ── Render ───────────────────────────────────────────

    function renderFeed(msgs) {
      feed.innerHTML = "";

      if (!msgs || msgs.length === 0) {
        feed.appendChild(empty);
        return;
      }

      // msgs[0] = oldest, msgs[n-1] = newest
      // data-age: 0 = oldest slot, 9 = newest slot (max 10 shown)
      const n = msgs.length;
      msgs.forEach((m, i) => {
        const age = Math.min(9, i + (10 - n)); // right-align age scale

        const div = document.createElement("div");
        div.className = "msg";
        div.dataset.age = age;

        const time = document.createElement("span");
        time.className = "msg-time";
        time.textContent = fmtTime(m.ts);

        const txt = document.createElement("span");
        txt.className = "msg-text";
        txt.textContent = m.text;

        div.appendChild(time);
        div.appendChild(txt);
        feed.appendChild(div);
      });
    }

    // ── Fetch (initial load + fallback polling) ───────────

    async function fetchMessages() {
      try {
        const res = await fetch(`${WORKER_URL}/messages`);
        if (!res.ok) throw new Error();
        renderFeed(await res.json());
      } catch {
        // silent — status dot already shows connection state
      }
    }

    function startFallbackPoll() {
      stopFallbackPoll();
      fallbackTimer = setInterval(fetchMessages, FALLBACK_MS);
    }

    function stopFallbackPoll() {
      if (fallbackTimer) { clearInterval(fallbackTimer); fallbackTimer = null; }
    }

    // ── Ably setup ───────────────────────────────────────

    async function connectAbly() {
      try {
        // Fetch a short-lived subscribe-only token from our Worker
        // so the real API key is never in the frontend
        const tokenRes = await fetch(`${WORKER_URL}/ably-token`);
        const tokenData = await tokenRes.json();

        ably = new Ably.Realtime({ token: tokenData.token });

        ably.connection.on("connected", () => {
          setStatus("live", "live");
          stopFallbackPoll(); // WebSocket is up — no need to poll
        });

        ably.connection.on("disconnected", () => {
          setStatus("reconnecting");
          startFallbackPoll();
        });

        ably.connection.on("failed", () => {
          setStatus("offline", "err");
          startFallbackPoll();
        });

        const channel = ably.channels.get(ABLY_CHANNEL);
        channel.subscribe("update", (msg) => {
          try {
            const messages = JSON.parse(msg.data);
            renderFeed(messages);
          } catch { /* ignore bad payloads */ }
        });

      } catch (e) {
        setStatus("offline", "err");
        startFallbackPoll();
      }
    }

    // ── Send ─────────────────────────────────────────────

    let sending = false;

    input.addEventListener("keydown", async (e) => {
      if (e.key !== "Enter") return;
      const text = input.value.trim();
      if (!text || sending) return;

      input.value = "";
      sending = true;

      try {
        const res = await fetch(`${WORKER_URL}/messages`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text }),
        });
        if (!res.ok) throw new Error();
        // The sender gets the updated list back immediately via HTTP response
        // Everyone else gets it via Ably push
        renderFeed(await res.json());
      } catch {
        setStatus("send failed", "err");
        setTimeout(() => setStatus("live", "live"), 2000);
      } finally {
        sending = false;
      }
    });

    // ── Boot ─────────────────────────────────────────────

    fetchMessages();   // populate immediately on load
    connectAbly();     // then hook up real-time
    input.focus();
  </script>
</body>
</html>
