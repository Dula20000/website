<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Clawd Run</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #f0e9dc;
    font-family: "Courier New", monospace;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    -webkit-user-select: none;
    user-select: none;
    touch-action: manipulation;
  }
  canvas {
    width: min(96vw, 960px);
    aspect-ratio: 16 / 9;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background: #f0e9dc;
    border: 4px solid #2a2019;
    box-shadow: 8px 8px 0 rgba(42, 32, 25, 0.18);
  }
  .hint {
    color: #8f8272;
    font-size: 13px;
    letter-spacing: 1px;
    margin: 0;
  }
  .plug {
    color: #c0392b;
    font-size: 11px;
    letter-spacing: 1px;
    text-decoration: none;
    margin: 0;
  }
  .plug:hover {
    color: #27ae60;
    text-decoration: underline;
  }
</style>
</head>
<body>
  <canvas id="game" width="320" height="180"></canvas>
  <p class="hint">SPACE / &uarr; / TAP to jump &middot; hold for a higher hop &middot; P to pause</p>
  <a class="plug" href="https://dulran.com">a dulran.com production</a>
  <script src="clauderungame.js"></script>
</body>
</html>
