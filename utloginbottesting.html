<!DOCTYPE html>
<html>
<head>
    <title>Mock UT Login</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 300px;
        }

        h2 {
            margin-bottom: 20px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #bf5700;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #a64b00;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>UTDirect Login</h2>

    <input type="text" id="username" placeholder="UT EID">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>
</div>

<script>
function login() {
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    if (user && pass) {
        // simulate redirect after login
        window.location.href = "utregisterbottesting.html";
    } else {
        alert("Enter credentials");
    }
}
</script>

</body>
</html>
