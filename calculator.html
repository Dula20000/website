<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }

        .calculator {
            background: linear-gradient(145deg, #2a2a3a, #1a1a28);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            max-width: 480px;
            width: 100%;
        }

        .display {
            background: linear-gradient(180deg, #0d1117 0%, #0a0d12 100%);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.5);
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .display .expression {
            color: #8b949e;
            font-size: 16px;
            text-align: right;
            min-height: 24px;
            word-wrap: break-word;
            word-break: break-all;
        }

        .display .result {
            color: #ffffff;
            font-size: 42px;
            font-weight: 300;
            text-align: right;
            margin-top: 8px;
            overflow-x: auto;
        }

        .mode-indicator {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }

        .mode-indicator span {
            color: #58a6ff;
            font-size: 12px;
            font-weight: 500;
            background: rgba(88, 166, 255, 0.1);
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-indicator span:hover {
            background: rgba(88, 166, 255, 0.2);
        }

        .mode-indicator span.active {
            background: rgba(35, 134, 54, 0.4);
            color: #3fb950;
            box-shadow: 0 0 10px rgba(63, 185, 80, 0.4);
        }

        .mode-indicator span:not(.active) {
            background: rgba(88, 166, 255, 0.1);
            color: #58a6ff;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        button {
            border: none;
            border-radius: 12px;
            padding: 16px 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
            font-family: inherit;
        }

        button:active {
            transform: scale(0.95);
        }

        .btn-number {
            background: linear-gradient(145deg, #3a3a4a, #2a2a38);
            color: #ffffff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .btn-number:hover {
            background: linear-gradient(145deg, #4a4a5a, #3a3a48);
        }

        .btn-operator {
            background: linear-gradient(145deg, #1f6feb, #1a5bc4);
            color: #ffffff;
            box-shadow: 0 4px 8px rgba(31, 111, 235, 0.3);
        }

        .btn-operator:hover {
            background: linear-gradient(145deg, #2f7ffc, #2a6bd4);
        }

        .btn-function {
            background: linear-gradient(145deg, #2a2a3a, #1a1a28);
            color: #8b949e;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .btn-function:hover {
            background: linear-gradient(145deg, #3a3a4a, #2a2a38);
            color: #ffffff;
        }

        .btn-clear {
            background: linear-gradient(145deg, #da3633, #c21c19);
            color: #ffffff;
            box-shadow: 0 4px 8px rgba(218, 54, 51, 0.3);
        }

        .btn-clear:hover {
            background: linear-gradient(145deg, #ea4643, #d22c29);
        }

        .btn-equals {
            background: linear-gradient(145deg, #238636, #1a6b2a);
            color: #ffffff;
            grid-column: span 2;
            box-shadow: 0 4px 8px rgba(35, 134, 54, 0.3);
        }

        .btn-equals:hover {
            background: linear-gradient(145deg, #339646, #2a7b3a);
        }

        .btn-wide {
            grid-column: span 2;
        }

        .sup {
            font-size: 0.7em;
            vertical-align: super;
        }

        @media (max-width: 500px) {
            .calculator {
                padding: 16px;
            }

            button {
                padding: 14px 6px;
                font-size: 14px;
            }

            .display .result {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display">
            <div class="expression" id="expression"></div>
            <div class="result" id="result">0</div>
        </div>
        <div class="mode-indicator">
            <span id="modeDeg" class="active" onclick="toggleAngleMode()">DEG</span>
            <span id="modeRad">RAD</span>
            <span id="modeHyp" onclick="toggleHyp()">HYP</span>
            <span id="mode2nd" onclick="toggle2nd()">2ND</span>
        </div>
        <div class="buttons">
            <!-- Row 1: Scientific functions -->
            <button class="btn-function" id="btnSin" onclick="inputFunction('sin')">sin</button>
            <button class="btn-function" id="btnCos" onclick="inputFunction('cos')">cos</button>
            <button class="btn-function" id="btnTan" onclick="inputFunction('tan')">tan</button>
            <button class="btn-function" onclick="inputFunction('log')">log</button>
            <button class="btn-function" onclick="inputFunction('ln')">ln</button>

            <!-- Row 2: More scientific functions -->
            <button class="btn-function" id="btnPower" onclick="inputOperator('^')">x<span class="sup">y</span></button>
            <button class="btn-function" onclick="inputFunction('sqrt')">√</button>
            <button class="btn-function" onclick="inputFunction('cbrt')">∛</button>
            <button class="btn-function" onclick="inputConstant('pi')">π</button>
            <button class="btn-function" onclick="inputConstant('e')">e</button>

            <!-- Row 3: Parentheses and extras -->
            <button class="btn-function" onclick="inputChar('(')">(</button>
            <button class="btn-function" onclick="inputChar(')')">)</button>
            <button class="btn-function" onclick="inputFunction('abs')">|x|</button>
            <button class="btn-function" onclick="inputFunction('square')">x<span class="sup">2</span></button>
            <button class="btn-function" onclick="inputFunction('inverse')">x<span class="sup">-1</span></button>

            <!-- Row 4: Memory and factorial -->
            <button class="btn-function" onclick="memoryStore()">MS</button>
            <button class="btn-function" onclick="memoryRecall()">MR</button>
            <button class="btn-function" onclick="memoryClear()">MC</button>
            <button class="btn-function" onclick="inputFunction('fact')">x!</button>
            <button class="btn-function" onclick="inputOperator('%')">%</button>

            <!-- Row 5: Clear and basic operators -->
            <button class="btn-clear" onclick="clearAll()">AC</button>
            <button class="btn-clear" onclick="clearEntry()">CE</button>
            <button class="btn-function" onclick="toggleSign()">±</button>
            <button class="btn-operator" onclick="inputOperator('/')">÷</button>
            <button class="btn-operator" onclick="inputOperator('*')">×</button>

            <!-- Row 6: Numbers 7-9 -->
            <button class="btn-number" onclick="inputChar('7')">7</button>
            <button class="btn-number" onclick="inputChar('8')">8</button>
            <button class="btn-number" onclick="inputChar('9')">9</button>
            <button class="btn-operator" onclick="inputOperator('-')">−</button>
            <button class="btn-function" onclick="inputFunction('exp')">e<span class="sup">x</span></button>

            <!-- Row 7: Numbers 4-6 -->
            <button class="btn-number" onclick="inputChar('4')">4</button>
            <button class="btn-number" onclick="inputChar('5')">5</button>
            <button class="btn-number" onclick="inputChar('6')">6</button>
            <button class="btn-operator" onclick="inputOperator('+')">+</button>
            <button class="btn-function" onclick="inputFunction('10x')">10<span class="sup">x</span></button>

            <!-- Row 8: Numbers 1-3 -->
            <button class="btn-number" onclick="inputChar('1')">1</button>
            <button class="btn-number" onclick="inputChar('2')">2</button>
            <button class="btn-number" onclick="inputChar('3')">3</button>
            <button class="btn-equals" onclick="calculate()">=</button>
            <button class="btn-function" onclick="inputFunction('10pow')">LOG</button>

            <!-- Row 9: Zero and decimal -->
            <button class="btn-number" onclick="inputChar('0')">0</button>
            <button class="btn-number" onclick="inputChar('.')">.</button>
            <button class="btn-function" onclick="backspace()">⌫</button>
        </div>
    </div>

    <script>
        let expression = '';
        let currentResult = '0';
        let angleMode = 'DEG'; // DEG or RAD
        let isHyp = false;
        let is2nd = false;
        let memory = 0;
        let lastAnswer = 0;

        function updateDisplay() {
            document.getElementById('expression').textContent = formatExpression(expression);
            document.getElementById('result').textContent = currentResult;
        }

        function formatExpression(expr) {
            return expr
                .replace(/\*/g, '×')
                .replace(/\//g, '÷')
                .replace(/-/g, '−')
                .replace(/sqrt\(/g, '√(')
                .replace(/cbrt\(/g, '∛(')
                .replace(/log\(/g, 'log(')
                .replace(/ln\(/g, 'ln(')
                .replace(/sin\(/g, 'sin(')
                .replace(/cos\(/g, 'cos(')
                .replace(/tan\(/g, 'tan(')
                .replace(/asin\(/g, 'sin⁻¹(')
                .replace(/acos\(/g, 'cos⁻¹(')
                .replace(/atan\(/g, 'tan⁻¹(')
                .replace(/abs\(/g, '|')
                .replace(/pi/g, 'π')
                .replace(/\^/g, '^');
        }

        function toRadians(value) {
            return angleMode === 'DEG' ? (value * Math.PI / 180) : value;
        }

        function fromRadians(value) {
            return angleMode === 'DEG' ? (value * 180 / Math.PI) : value;
        }

        function factorial(n) {
            if (n < 0) return NaN;
            if (n === 0 || n === 1) return 1;
            if (n > 170) return Infinity;
            let result = 1;
            for (let i = 2; i <= n; i++) result *= i;
            return result;
        }

        function safeEval(expr) {
            try {
                let processed = expr
                    .replace(/×/g, '*')
                    .replace(/÷/g, '/')
                    .replace(/−/g, '-')
                    .replace(/π/g, 'Math.PI')
                    .replace(/e(?![x])/g, 'Math.E')
                    .replace(/\^/g, '**');

                // Handle implicit multiplication: 2( -> 2*(
                processed = processed.replace(/(\d)\(/g, '$1*(');
                processed = processed.replace(/\)(\d)/g, ')*$1');
                processed = processed.replace(/\)\(/g, ')*(');

                // Handle functions
                processed = processed.replace(/sin\(([^)]+)\)/g, (match, arg) => {
                    const val = safeEval(arg);
                    return isHyp ? Math.sinh(val) : Math.sin(toRadians(val));
                });
                processed = processed.replace(/cos\(([^)]+)\)/g, (match, arg) => {
                    const val = safeEval(arg);
                    return isHyp ? Math.cosh(val) : Math.cos(toRadians(val));
                });
                processed = processed.replace(/tan\(([^)]+)\)/g, (match, arg) => {
                    const val = safeEval(arg);
                    return isHyp ? Math.tanh(val) : Math.tan(toRadians(val));
                });
                processed = processed.replace(/asin\(([^)]+)\)/g, (match, arg) => {
                    const val = safeEval(arg);
                    const res = isHyp ? Math.asinh(val) : Math.asin(val);
                    return isHyp ? res : fromRadians(res);
                });
                processed = processed.replace(/acos\(([^)]+)\)/g, (match, arg) => {
                    const val = safeEval(arg);
                    const res = isHyp ? Math.acosh(val) : Math.acos(val);
                    return isHyp ? res : fromRadians(res);
                });
                processed = processed.replace(/atan\(([^)]+)\)/g, (match, arg) => {
                    const val = safeEval(arg);
                    const res = isHyp ? Math.atanh(val) : Math.atan(val);
                    return isHyp ? res : fromRadians(res);
                });
                processed = processed.replace(/log\(([^)]+)\)/g, (match, arg) => `Math.log10(${arg})`);
                processed = processed.replace(/ln\(([^)]+)\)/g, (match, arg) => `Math.log(${arg})`);
                processed = processed.replace(/sqrt\(([^)]+)\)/g, (match, arg) => `Math.sqrt(${arg})`);
                processed = processed.replace(/cbrt\(([^)]+)\)/g, (match, arg) => `Math.cbrt(${arg})`);
                processed = processed.replace(/abs\(([^)]+)\)/g, (match, arg) => `Math.abs(${arg})`);

                // eslint-disable-next-line no-new-func
                return new Function('return ' + processed)();
            } catch (e) {
                return NaN;
            }
        }

        function cleanNumber(num) {
            // Handle floating-point precision issues for trigonometric and other functions
            if (isNaN(num)) return NaN;
            if (!isFinite(num)) return num;
            
            // If the number is extremely close to a known mathematical value, snap to it
            const epsilon = 1e-10;
            const specialValues = [0, 1, -1, 0.5, -0.5, Math.sqrt(2)/2, -Math.sqrt(2)/2, 
                                  Math.sqrt(3)/2, -Math.sqrt(3)/2, 1/Math.sqrt(2), -1/Math.sqrt(2)];
            
            for (const special of specialValues) {
                if (Math.abs(num - special) < epsilon) {
                    return special;
                }
            }
            
            // Round to 10 decimal places to eliminate floating-point artifacts
            return Math.round(num * 1e10) / 1e10;
        }

        function formatNumber(num) {
            if (isNaN(num)) return 'Error';
            if (!isFinite(num)) return num > 0 ? 'Infinity' : '-Infinity';
            
            // Clean the number first
            num = cleanNumber(num);
            
            // Check again if it snapped to a special value
            if (num === 0) return '0';
            if (num === 1) return '1';
            if (num === -1) return '-1';
            if (num === 0.5) return '0.5';
            if (num === -0.5) return '-0.5';
            
            if (Number.isInteger(num) && Math.abs(num) < 1e15) return num.toString();
            const str = num.toExponential(8);
            return parseFloat(str).toString();
        }

        function inputChar(char) {
            expression += char;
            updateDisplay();
        }

        function inputOperator(op) {
            if (expression.length > 0 || currentResult !== '0') {
                if (expression.length === 0) expression = currentResult;
                expression += ` ${op} `;
                updateDisplay();
            }
        }

        function inputFunction(func) {
            if (is2nd) {
                const funcMap = {
                    'sin': 'asin',
                    'cos': 'acos',
                    'tan': 'atan',
                    'sqrt': 'square',
                    'log': '10x',
                    'ln': 'exp'
                };
                func = funcMap[func] || func;
                toggle2nd();
            }
            
            if (['sin', 'cos', 'tan', 'asin', 'acos', 'atan', 'log', 'ln', 'sqrt', 'cbrt', 'abs'].includes(func)) {
                expression += func + '(';
            } else if (func === 'square') {
                expression += '^2';
            } else if (func === 'inverse') {
                expression += '^(-1)';
            } else if (func === 'fact') {
                // Will be handled in calculation
                expression += 'fact(';
            } else if (func === 'exp') {
                expression += 'exp(';
            } else if (func === '10x') {
                expression += '10^(';
            } else if (func === '10pow') {
                expression += '10^';
            }
            updateDisplay();
        }

        function inputConstant(constant) {
            expression += constant === 'pi' ? 'π' : 'e';
            updateDisplay();
        }

        function toggleSign() {
            if (currentResult !== '0') {
                if (expression.length > 0) {
                    const lastChar = expression.trim().slice(-1);
                    if (lastChar === '-' || lastChar === '−') {
                        expression = expression.trim().slice(0, -1);
                    } else {
                        expression += '(-';
                    }
                    updateDisplay();
                } else {
                    if (currentResult.startsWith('-')) {
                        currentResult = currentResult.substring(1);
                    } else {
                        currentResult = '-' + currentResult;
                    }
                    updateDisplay();
                }
            }
        }

        function backspace() {
            expression = expression.trimEnd();
            if (expression.endsWith(' ')) {
                expression = expression.slice(0, -3);
            } else {
                expression = expression.slice(0, -1);
            }
            updateDisplay();
        }

        function clearAll() {
            expression = '';
            currentResult = '0';
            updateDisplay();
        }

        function clearEntry() {
            expression = '';
            updateDisplay();
        }

        function calculate() {
            if (expression.length === 0) return;
            
            // Handle factorial
            let expr = expression.replace(/fact\(([^)]+)\)/g, (match, arg) => {
                const num = safeEval(arg);
                return factorial(Math.floor(num));
            });

            const result = safeEval(expr);
            const cleanedResult = cleanNumber(result);
            lastAnswer = cleanedResult;
            currentResult = formatNumber(cleanedResult);
            document.getElementById('expression').textContent = formatExpression(expression) + ' =';
            document.getElementById('result').textContent = currentResult;
            expression = currentResult;
        }

        function toggleAngleMode() {
            angleMode = angleMode === 'DEG' ? 'RAD' : 'DEG';
            document.getElementById('modeDeg').classList.toggle('active');
            document.getElementById('modeRad').classList.toggle('active');
            updateDisplay();
        }

        function toggleHyp() {
            isHyp = !isHyp;
            document.getElementById('modeHyp').classList.toggle('active');
            
            const sinBtn = document.getElementById('btnSin');
            const cosBtn = document.getElementById('btnCos');
            const tanBtn = document.getElementById('btnTan');
            
            if (isHyp) {
                sinBtn.textContent = 'sinh';
                cosBtn.textContent = 'cosh';
                tanBtn.textContent = 'tanh';
                sinBtn.onclick = () => inputFunction('sinh');
                cosBtn.onclick = () => inputFunction('cosh');
                tanBtn.onclick = () => inputFunction('tanh');
            } else {
                sinBtn.textContent = 'sin';
                cosBtn.textContent = 'cos';
                tanBtn.textContent = 'tan';
                sinBtn.onclick = () => inputFunction('sin');
                cosBtn.onclick = () => inputFunction('cos');
                tanBtn.onclick = () => inputFunction('tan');
            }
        }

        function toggle2nd() {
            is2nd = !is2nd;
            document.getElementById('mode2nd').classList.toggle('active');
            
            const sinBtn = document.getElementById('btnSin');
            const cosBtn = document.getElementById('btnCos');
            const tanBtn = document.getElementById('btnTan');
            const sqrtBtn = document.getElementById('btnPower');
            
            if (is2nd) {
                sinBtn.textContent = 'sin⁻¹';
                cosBtn.textContent = 'cos⁻¹';
                tanBtn.textContent = 'tan⁻¹';
                sqrtBtn.innerHTML = 'x<span class="sup">√</span>';
            } else {
                sinBtn.textContent = 'sin';
                cosBtn.textContent = 'cos';
                tanBtn.textContent = 'tan';
                sqrtBtn.innerHTML = 'x<span class="sup">y</span>';
            }
        }

        function memoryStore() {
            const val = parseFloat(currentResult);
            if (!isNaN(val)) {
                memory = val;
            }
        }

        function memoryRecall() {
            expression += memory.toString();
            updateDisplay();
        }

        function memoryClear() {
            memory = 0;
        }

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') inputChar(e.key);
            else if (e.key === '.') inputChar('.');
            else if (e.key === '+') inputOperator('+');
            else if (e.key === '-') inputOperator('-');
            else if (e.key === '*') inputOperator('*');
            else if (e.key === '/') { e.preventDefault(); inputOperator('/'); }
            else if (e.key === '^') inputOperator('^');
            else if (e.key === '(' || e.key === ')') inputChar(e.key);
            else if (e.key === 'Enter' || e.key === '=') calculate();
            else if (e.key === 'Escape') clearAll();
            else if (e.key === 'Backspace') backspace();
        });
    </script>
</body>
</html>
