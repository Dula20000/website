body, html {
  margin: 0;
  padding: 0;

/* INTRO VIDEO */

.noscroll {

/* CANVAS BACKGROUND */
#canvas {

/* Ensure canvas stays visible and doesn't get hidden */
#canvas.tubes-active {
  display: block !important;

/* TEXT GROUP */
.hero {
  height: 100%;

  flex-direction: column;
  justify-content: center;

.hero h1,

  background-size: 200% 200%;
  background-clip: text;
  -webkit-background-clip: text;
  animation: shine 4s infinite ease-in-out;
  filter: drop-shadow(0 0 20px rgba(255,255,255,0.25));
  user-select: none;
}

@keyframes shine {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.hero a {
  text-decoration: none;
  color: inherit;
}

.hero a:hover h2,
.hero a:hover h3 {
  filter: drop-shadow(0 0 35px rgba(255,255,255,0.8));
  cursor: pointer;
  transition: 0.3s ease;
}

<script type="module">
// Tubes Cursor effect
import TubesCursor from "https://cdn.jsdelivr.net/npm/threejs-components@0.0.19/build/cursors/tubes1.min.js"

const canvasEl = document.getElementById('canvas');
const app = TubesCursor(canvasEl, {
  tubes: {
    colors: ["#f967fb", "#53bc28", "#6958d5"],
    lights: {
      intensity: 200,
      colors: ["#83f36e", "#fe8a2e", "#ff008c", "#60aed5"]
    }
  }
})

// Ensure tubes persist indefinitely
canvasEl.classList.add('tubes-active');

document.body.addEventListener('click', () => {
  const colors = randomColors(3)
  const lightsColors = randomColors(4)
  app.tubes.setColors(colors)
  app.tubes.setLightsColors(lightsColors)
})

function randomColors(count) {
  return new Array(count)
    .fill(0)
    .map(() => "#" + Math.floor(Math.random()*16777215).toString(16).padStart(6,'0'))
}


// Auto-scroll reveal logic with Safari autoplay fix
const video = document.getElementById("introVideo");
const content = document.getElementById("content");

function reveal() {
  content.style.opacity = "1";
  content.style.pointerEvents = "auto";
  document.body.classList.remove("noscroll");
  window.scrollTo({ top: window.innerHeight, behavior: "smooth" });
}

// Safari autoplay fix: ensure video is ready and actually playing
async function tryPlayVideo(videoElement) {
  try {
    // Make sure video is loaded
    if (videoElement.readyState >= 2) {
      await videoElement.play();
      return true;
    }
  } catch (err) {
    console.log('Autoplay blocked, showing content immediately');
  }
  return false;
}

// Check if video has already been shown
if (localStorage.getItem("videoPlayed")) {
  // Skip video entirely on repeat visits
  video.style.display = "none";
  reveal();
} else {
  // Try to play video (Safari-safe)
  tryPlayVideo(video).then((played) => {
    if (!played) {
      // If autoplay blocked, just show content
      localStorage.setItem("videoPlayed", "true");
      video.style.display = "none";
      reveal();
      return;
    }
    
    // Video is playing, wait for it to end
    video.addEventListener("ended", () => {
      localStorage.setItem("videoPlayed", "true");
      reveal();
    });
  });

  // Safety fallback (6 sec)
  setTimeout(() => {
    if (!localStorage.getItem("videoPlayed")) {
      localStorage.setItem("videoPlayed", "true");
      video.style.display = "none";
      reveal();
    }
  }, 6000);
}

// Keep tubes rendering - ensure animation loop continues
function animate() {
  requestAnimationFrame(animate);
}
animate();
</script>
