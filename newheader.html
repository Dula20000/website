<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chase-Style Logo Collapse</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body {
      min-height: 300vh;
      font-family: Arial, sans-serif;
      background: #000000;
    }

    .header-shell {
      height: 70px;
    }

    .header {
      background: #000000;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 15;
      width: 100%;
      height: 140px;
      overflow: hidden;
      box-shadow: 0 0 7px rgba(0, 0, 0, 0.35);
      transition: top .2s cubic-bezier(.3,.73,.3,.74);
      padding: 0 calc(50% - 470px) 0 calc(50% - 495px);
    }

    .logo {
      margin: 15px auto 0;
      width: 210px;
      position: relative;
      left: 0;
      display: flex;
      align-items: center;
      transform: translateX(0);
      will-change: width, transform;
    }

    .logo-icon {
      z-index: 2;
      position: relative;
      display: inline-block;
      vertical-align: middle;
      flex: 0 0 auto;
    }

    .logo-icon img {
      width: 100px;
      display: block;
    }

    .logo-text {
      overflow: hidden;
      z-index: 1;
      width: 200px;
      position: relative;
      display: inline-block;
      vertical-align: middle;
      flex: 0 0 auto;
      will-change: width, opacity;
    }

    .logo-text img {
      width: 145px;
      max-width: 145px;
      display: block;
    }

    .hero {
      background: #7F1C1A;
      color: #000000;
      padding: 120px 24px 80px;
      text-align: center;
    }

    .content {
      padding: 40px 24px;
      max-width: 900px;
      margin: 0 auto;
      color: white;
      text-align: center;
    }

    @media (max-width: 1023px) {
      .header {
        padding: 0;
      }
    }
  </style>
</head>
<body>
  <div class="header-shell"></div>

  <header class="header">
    <div class="logo" id="logo">
      <div class="logo-text" id="logoText">
        <img
          id="dynamicImage"
          src=""
          alt="Chase Logo Text"
        />
      </div>
      <div class="logo-icon">
        <img
          src="https://dulran.com/logofiles/crestlogomedium.png"
          alt="Chase Logo Icon"
        />
      </div>
    </div>
  </header>

  <section class="hero">
    <h1>Scroll down</h1>
    <p>The wordmark collapses into the icon.</p>
  </section>

  <main class="content">
    <p>Placeholder content.</p>
    <p>Keep scrolling to test the header animation.</p>
  </main>
  <script>//this function picks between multiple text logo styles to serve
    // Array of image sources
    const images = [
      "https://dulran.com/logofiles/DulranCMUstyle.png",
      "https://dulran.com/logofiles/dulranrussian.png"
    ];
  
    // Pick one at random
    const selectedImage = images[Math.floor(Math.random() * images.length)];
  
    // Set the src of the image element
    document.getElementById("dynamicImage").src = selectedImage;
  </script> 

  <script>
    const logo = document.getElementById("logo");
    const logoText = document.getElementById("logoText");

    const START_LOGO_WIDTH = 210;
    const END_LOGO_WIDTH = 20;

    const START_TEXT_WIDTH = 145;
    const END_TEXT_WIDTH = 0;

    const START_SHIFT = 12.5;
    const END_SHIFT = 0;

    const SCROLL_DISTANCE = 120;

    function clamp(n, min, max) {
      return Math.min(Math.max(n, min), max);
    }

    function ease(t) {
      return 1 - Math.pow(1 - t, 3);
    }

    function updateLogo() {
      const raw = clamp(window.scrollY / SCROLL_DISTANCE, 0, 1);
      const t = ease(raw);

      const logoWidth = START_LOGO_WIDTH + (END_LOGO_WIDTH - START_LOGO_WIDTH) * t;
      const textWidth = START_TEXT_WIDTH + (END_TEXT_WIDTH - START_TEXT_WIDTH) * t;
      const shift = START_SHIFT + (END_SHIFT - START_SHIFT) * t;

      logo.style.width = `${logoWidth}px`;
      logo.style.transform = `translateX(${-shift}px)`;
      logoText.style.width = `${textWidth}px`;
    }

    updateLogo();
    window.addEventListener("scroll", updateLogo, { passive: true });
    window.addEventListener("resize", updateLogo);
  </script>
</body>
</html>
