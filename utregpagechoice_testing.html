<!DOCTYPE html>
<html>
<head>
    <meta charset="iso-8859-1">
    <title>Registration</title>
    <style type="text/css">
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #fff;
        }
        h1 {
            color: #bf5700;
        }
        form {
            margin: 10px 0;
        }
        input[type="submit"] {
            padding: 10px 20px;
            background: #bf5700;
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 1em;
        }
        input[type="submit"]:hover {
            background: #a04900;
        }
        #regContent {
            margin-top: 20px;
        }
        .notification {
            font-weight: bold;
            padding: 10px;
        }
    </style>
</head>
<body>

    <div id="skip"><a href="#main_content">Skip to Main Content</a></div>

    <div id="content">
        <a name="main_content"></a>

        <div id="utd_toppage">
            <div class="pageTitle noTabs">
                <div id="pgTitle"><h1>Registration semester selection</h1></div>
                <div id="utilities"></div>
            </div>
        </div>

        <div id="service_content">
            <div id="regContent">
                <p>Please select a registration semester:</p>
                <br>

                <div>
                    <form action="utregisterbottesting.html" method="get" id="summer2026form">
                        <input type="hidden" name="s_request" value="STGEM">
                        <input type="hidden" name="s_student_eid" value="">
                        <input type="hidden" name="s_ccyys" value="20266">

                        <input type="submit" name="submit" value="Summer 2026 Registration">
                    </form>
                </div>
                <br>

                <div>
                    <form action="utregisterbottesting.html" method="get" id="fall2026form">
                        <input type="hidden" name="s_request" value="STGAR">
                        <input type="hidden" name="s_student_eid" value="">
                        <input type="hidden" name="s_ccyys" value="20269">

                        <input type="submit" name="submit" value="Fall 2026 Registration">
                    </form>
                </div>
                <br>

            </div>
        </div>
    </div>

</body>
</html>
